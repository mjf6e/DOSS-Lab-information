<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOSS Lab Directory — University of Virginia</title>
<meta name="description" content="Directory of personnel, equipment, and research interests across the Division of Surgical Sciences at the University of Virginia.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DOSS Lab Directory — styles
   Palette: UVA Jefferson navy + Cavalier orange
   Type:    Fraunces (display) + Inter (body)
   ============================================================ */

:root {
  --navy:        #232D4B;
  --navy-dim:    #3A445E;
  --orange:      #E57200;
  --orange-dim:  #C36400;
  --bg:          #FAFAF7;
  --bg-card:     #FFFFFF;
  --border:      #E5E2D8;
  --text:        #1A1A1A;
  --text-muted:  #6B6B6B;
  --text-soft:   #4A4A4A;
  --highlight:   #FFF4D8;

  --font-display: "Fraunces", ui-serif, Georgia, serif;
  --font-body:    "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --max-width:  1120px;
  --radius:     6px;
  --radius-lg:  12px;
  --shadow:     0 1px 2px rgba(35,45,75,0.06), 0 4px 12px rgba(35,45,75,0.04);
  --shadow-lift: 0 4px 12px rgba(35,45,75,0.10), 0 12px 32px rgba(35,45,75,0.06);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ── Top navigation ─────────────────────────────────────────── */
.site-header {
  border-top: 4px solid var(--orange);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: saturate(1.4) blur(6px);
  background: rgba(250, 250, 247, 0.92);
}
.site-header-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 32px;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
  text-decoration: none;
  color: inherit;
}
.brand-mark {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  color: var(--navy);
  letter-spacing: -0.01em;
}
.brand-mark .amp { color: var(--orange); }
.brand-tag {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.site-nav {
  margin-left: auto;
  display: flex;
  gap: 6px;
}
.site-nav a {
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius);
  transition: background 120ms;
}
.site-nav a:hover { background: rgba(35,45,75,0.06); }
.site-nav a.active {
  background: var(--navy);
  color: white;
}
@media (max-width: 640px) {
  .site-header-inner { padding: 12px 16px; gap: 12px; flex-wrap: wrap; }
  .brand-tag { display: none; }
  .site-nav { margin-left: 0; width: 100%; overflow-x: auto; }
}

/* ── Layout ─────────────────────────────────────────────────── */
main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 48px 24px 96px;
}
@media (max-width: 640px) { main { padding: 32px 16px 64px; } }

/* ── Home hero ──────────────────────────────────────────────── */
.hero {
  padding: 32px 0 40px;
}
.hero-eyebrow {
  font-size: 13px;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
  margin-bottom: 16px;
}
.hero h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(38px, 5vw, 56px);
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin: 0 0 20px;
  color: var(--navy);
}
.hero h1 em {
  font-style: italic;
  color: var(--orange);
  font-weight: 400;
}
.hero-lede {
  font-size: 18px;
  color: var(--text-soft);
  max-width: 620px;
  margin: 0 0 40px;
}

/* Search box */
.search-hero {
  position: relative;
  max-width: 620px;
}
.search-hero input {
  width: 100%;
  padding: 20px 20px 20px 56px;
  font-size: 18px;
  font-family: var(--font-body);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-card);
  transition: border-color 120ms, box-shadow 120ms;
  color: var(--text);
}
.search-hero input::placeholder { color: #999; }
.search-hero input:focus {
  outline: none;
  border-color: var(--orange);
  box-shadow: 0 0 0 4px rgba(229,114,0,0.15);
}
.search-hero svg {
  position: absolute;
  top: 50%;
  left: 20px;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

/* Stats strip */
.stats {
  display: flex;
  gap: 40px;
  margin: 32px 0 56px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 20px 0;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-number {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 28px;
  color: var(--navy);
  line-height: 1;
}
.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}

/* Section heading style */
.section-heading {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin: 48px 0 24px;
}
.section-heading h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 28px;
  margin: 0;
  color: var(--navy);
  letter-spacing: -0.015em;
}
.section-heading .count {
  font-family: var(--font-display);
  font-weight: 400;
  font-style: italic;
  color: var(--orange);
  font-size: 20px;
}
.section-heading::before {
  content: "";
  width: 32px;
  height: 3px;
  background: var(--orange);
  display: inline-block;
  margin-right: 4px;
}

/* Lab grid on home */
.lab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 24px;
}
.lab-tile {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  transition: transform 200ms, box-shadow 200ms, border-color 200ms;
}
.lab-tile:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lift);
  border-color: var(--orange);
}
.lab-tile-photos {
  display: flex;
  aspect-ratio: 4 / 3;
  background: #F0EEE6;
  overflow: hidden;
  align-items: stretch;
}
.lab-tile-photos img {
  flex: 1;
  min-width: 0;
  object-fit: cover;
  object-position: center 25%;
  height: 100%;
  width: 100%;
  display: block;
}
.lab-tile-photos.empty {
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 12px;
  font-style: italic;
}
.lab-tile-body {
  padding: 14px 16px 16px;
  border-top: 1px solid var(--border);
}
.lab-tile-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
  color: var(--navy);
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.lab-tile-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ── Directory view (people + equipment) ───────────────────── */
.view-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 42px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--navy);
  margin: 0 0 8px;
}
.view-subtitle {
  font-size: 16px;
  color: var(--text-soft);
  margin: 0 0 32px;
}

/* Sticky search under nav */
.search-panel {
  position: sticky;
  top: 63px;
  background: var(--bg);
  padding: 12px 0 16px;
  z-index: 5;
  border-bottom: 1px solid var(--border);
  margin: 0 0 24px;
}
.search-input-wrap {
  position: relative;
}
.search-input-wrap input {
  width: 100%;
  padding: 12px 44px 12px 44px;
  font-size: 15px;
  font-family: var(--font-body);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  transition: border-color 120ms, box-shadow 120ms;
}
.search-input-wrap input:focus {
  outline: none;
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(229,114,0,0.12);
}
.search-input-wrap svg.icon-search {
  position: absolute;
  top: 50%; left: 14px;
  transform: translateY(-50%);
  color: var(--text-muted);
}
.search-clear {
  position: absolute;
  top: 50%; right: 12px;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--text-muted);
  display: none;
  border-radius: 3px;
}
.search-clear:hover { color: var(--text); background: rgba(0,0,0,0.05); }
.search-clear.visible { display: block; }
.result-count {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 10px;
  font-weight: 500;
}
.result-count strong { color: var(--navy); font-weight: 600; }

/* Results list */
.results {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 8px;
}
.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: border-color 120ms;
}
.result-card:hover { border-color: #C8C4B4; }

.result-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.result-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  color: var(--navy);
  letter-spacing: -0.01em;
}
.result-name.muted { color: var(--text-muted); font-style: italic; font-weight: 400; }
.result-lab {
  font-size: 12px;
  color: var(--orange);
  background: rgba(229,114,0,0.08);
  padding: 3px 10px;
  border-radius: 999px;
  font-weight: 500;
  text-decoration: none;
  transition: background 120ms;
  white-space: nowrap;
}
.result-lab:hover { background: rgba(229,114,0,0.16); }
.result-fields {
  display: grid;
  gap: 8px;
  font-size: 14px;
  color: var(--text-soft);
}
.result-field {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 12px;
  align-items: baseline;
}
.result-field-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  padding-top: 2px;
}
.result-field-value { line-height: 1.5; }
@media (max-width: 640px) {
  .result-field { grid-template-columns: 1fr; gap: 2px; }
}

/* Equipment results are more compact */
.equipment-card {
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 200px 160px 1fr;
  gap: 16px;
  align-items: baseline;
  font-size: 14px;
}
.equipment-card .result-lab { justify-self: start; }
.equipment-contact { color: var(--text-muted); font-size: 13px; }
.equipment-name { color: var(--text); line-height: 1.4; }
@media (max-width: 720px) {
  .equipment-card {
    grid-template-columns: 1fr;
    gap: 6px;
    padding: 14px 16px;
  }
}

/* Search highlight */
mark {
  background: var(--highlight);
  color: inherit;
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 500;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state h3 {
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--navy);
  font-size: 20px;
  margin: 0 0 8px;
}
.empty-state p { margin: 0; font-size: 14px; }

/* ── Lab detail view ────────────────────────────────────────── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 24px;
  transition: color 120ms;
}
.back-link:hover { color: var(--orange); }

.lab-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 40px;
  align-items: start;
  margin-bottom: 40px;
  padding-bottom: 40px;
  border-bottom: 1px solid var(--border);
}
.pi-photos {
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}
.pi-photo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.pi-photo {
  width: 160px;
  height: 200px;
  object-fit: cover;
  object-position: center 25%;
  border-radius: var(--radius);
  background: #F0EEE6;
  box-shadow: var(--shadow);
}
.pi-caption {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.lab-hero-content h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 42px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--navy);
  margin: 0 0 8px;
}
.lab-hero-content .pi-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--orange);
  font-weight: 600;
  margin-bottom: 24px;
}
.lab-hero-content .lab-stats {
  display: flex;
  gap: 32px;
  color: var(--text-soft);
  font-size: 14px;
}
.lab-hero-content .lab-stats strong {
  font-family: var(--font-display);
  color: var(--navy);
  font-size: 18px;
  font-weight: 600;
  display: block;
  margin-bottom: 2px;
}
@media (max-width: 640px) {
  .lab-hero { grid-template-columns: 1fr; gap: 24px; }
  .lab-hero-content h1 { font-size: 32px; }
  .pi-photo { width: 130px; height: 165px; }
}

/* Personnel table on lab page */
.personnel-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.person-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.person-card .result-name { margin-bottom: 12px; display: block; }
.empty-lab-note {
  padding: 24px;
  background: rgba(229,114,0,0.06);
  border: 1px dashed var(--orange);
  border-radius: var(--radius);
  color: var(--text-soft);
  font-size: 14px;
  font-style: italic;
}

/* ── Footer ─────────────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 32px 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 60px;
}
footer .divider { color: var(--border); margin: 0 8px; }

/* ── Utility ────────────────────────────────────────────────── */
.hidden { display: none !important; }
a.chip-link { text-decoration: none; }
</style>
</head>

ted cardiac dysfunction."},{"name":"Kyung Eun Lee","assets":"","expertise":"Molecular Biology, Cell Biology, Biochemistry, Muscle Physiology, and Small Animal Surgery","interests":"My research focuses on muscle physiology in the context of muscular dystrophy and age-related sarcopenia. I am also interested in translating mechanistic insights from muscle biology to other age-associated conditions, particularly neurodegenerative diseases affecting the brain."},{"name":"Xinyu Zhou","assets":"Zeiss Stellaris 5 confocal microscope with live cell imaging module, Zeiss ratiometric Ca²⁺ imaging microscope, Zeiss pathology slide scanning microscope, quantitative image analysis workstation","expertise":"IHC/IF/ICC, advanced microscopy, live cell imaging, Ca²⁺ imaging, quantitative image analysis","interests":"Cardiac and skeletal muscle biology and disease, calcium signaling in muscle physiology and pathology, imaging method development and quantitative image analysis"},{"name":"Yuchen Chen","assets":"","expertise":"Research strengths include: mouse models of aging, lupus, sepsis, and lung cancer; cell-based studies; in vitro and in vivo therapeutic evaluation; in vitro citrullination assays. Cell and molecular biology, biochemistry, cancer biology, and epigenetic regulation.","interests":"Skeletal muscle-organ communication; mechanisms regulating immune responses and oxidative homeostasis in acute and chronic diseases (including sepsis, aging, autoimmune disorders, lung cancer and drug resistance); and the translational development of protein biologics, antibodies, and peptide-based therapeutics."},{"name":"Eunhye Ji","assets":"","expertise":"cell biology, molecular biology, animal handling","interests":"Systemic inflammation, Immune response, colon inflammation and immunity, Citrullination"},{"name":"Xi Chen","assets":"","expertise":"MI mouse model, mouse heart echo, HE staining, genotyping","interests":"microsurgery, animal heart and vascular echo and MRI imaging"},{"name":"Zach Dawson","assets":"","expertise":"Colon, Intestinal Organoids","interests":"Microscopy, writing, and mentorship.Science Diplomacy"},{"name":"Chaunxi Cai","assets":"","expertise":"My research expertise encompasses molecular and cellular biology, tissue injury and repair, cardiovascular biology, and cancer biology.","interests":"Our laboratory investigates molecular and cellular therapeutic strategies for tissue injury and repair, with a particular focus on heart and lung pathology. Complementing this work, we conduct cancer research aimed at understanding the molecular basis of tumorigenesis during aging, seeking to identify key molecular targets and mimetics that can inhibit age-associated tumor development. Together, these research directions reflect our overarching commitment to advancing translational medicine across cardiovascular, pulmonary, and oncological diseases."},{"name":"James Ko","assets":"","expertise":"Molecular & cell biology, biochemistry, high-throughput gene manipulation & site-directed mutagenesis, \nsiRNA/CRISPR\nStable cell line establishment,\nBioassay developments,\nBioinformatics","interests":"I am focusing on pioneering a novel platform of biopharmaceuticals using probiotics-derived extra-vesicles (EVs) isolated from a genetically modified Lactobacillus strain expressing human MG53 protein for IBD treatment, and on investigating a novel function of MG53 in muscle autophagy to apply for muscular neuronal diseases."},{"name":"Xiaoliang Wang","assets":"","expertise":"Cardiac Physiology","interests":"Mechanisms of Myocardial Injury and Therapeutic Strategies"},{"name":"Xindi Zeng","assets":"","expertise":"Animal surgery, molecular and cell biology","interests":"Wound healing and diabetes"}]},{"slug":"guo-lab","sheet_name":"Guo Lab","display_name":"Guo Lab","photos":["data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4 <script>
/* ============================================================
   DOSS Lab Directory — client
   ============================================================ */

const app = document.getElementById("app");
let DATA = null;

/* ── Utilities ────────────────────────────────────────────── */
const $ = (sel, root=document) => root.querySelector(sel);
const el = (tag, attrs={}, children=[]) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
};

const escapeHTML = (s) =>
  String(s ?? "").replace(/[&<>"']/g, (c) => (
    { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
  ));

const escapeRegex = (s) => String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

const highlight = (text, query) => {
  const t = escapeHTML(text || "");
  if (!query) return t;
  const q = escapeRegex(query);
  return t.replace(new RegExp(`(${q})`, "gi"), "<mark>$1</mark>");
};

const matches = (haystack, query) => {
  if (!query) return true;
  return String(haystack || "").toLowerCase().includes(query.toLowerCase());
};

const labBySlug = (slug) => DATA.labs.find((l) => l.slug === slug);

/* Aggregate personnel across labs — used by Directory */
const allPersonnel = () => {
  const list = [];
  for (const lab of DATA.labs) {
    for (const p of lab.personnel) {
      list.push({ ...p, lab });
    }
  }
  return list;
};

/* Aggregate equipment — split each person's "assets" field into items */
const allEquipment = () => {
  const items = [];
  for (const lab of DATA.labs) {
    for (const p of lab.personnel) {
      if (!p.assets) continue;
      // Prefer semicolons, then newlines, else short comma-lists
      let parts;
      if (p.assets.includes(";")) parts = p.assets.split(";");
      else if (p.assets.includes("\n")) parts = p.assets.split("\n");
      else {
        const commaParts = p.assets.split(",").map(s => s.trim()).filter(Boolean);
        const avgLen = commaParts.length ? commaParts.reduce((s,x)=>s+x.length,0)/commaParts.length : 0;
        parts = (commaParts.length && avgLen < 40) ? commaParts : [p.assets];
      }
      for (const raw of parts) {
        const item = raw.trim();
        if (item) items.push({ lab, contact: p.name || "—", equipment: item });
      }
    }
  }
  return items;
};

/* ── Routing ──────────────────────────────────────────────── */
const parseHash = () => {
  const hash = window.location.hash.replace(/^#\/?/, "") || "";
  const [path, queryStr] = hash.split("?");
  const params = new URLSearchParams(queryStr || "");
  const segments = path.split("/").filter(Boolean);
  return { segments, params };
};

const setSearchParam = (key, value) => {
  const { segments, params } = parseHash();
  if (value) params.set(key, value); else params.delete(key);
  const qs = params.toString();
  const newHash = "#/" + segments.join("/") + (qs ? "?" + qs : "");
  history.replaceState(null, "", newHash);
};

const setActiveNav = (route) => {
  document.querySelectorAll("#site-nav a").forEach((a) => {
    a.classList.toggle("active", a.dataset.route === route);
  });
};

/* ── Views ────────────────────────────────────────────────── */

function renderHome() {
  setActiveNav("home");
  const totalPeople = DATA.labs.reduce((s, l) => s + l.personnel.filter(p => p.name).length, 0);
  const totalLabs = DATA.labs.length;
  const totalEquip = allEquipment().length;

  app.innerHTML = "";

  const hero = el("section", { class: "hero" }, [
    el("div", { class: "hero-eyebrow" }, "University of Virginia · School of Medicine"),
    el("h1", { html: 'Find who&rsquo;s doing what across <em>Surgical&nbsp;Sciences.</em>' }),
    el("p", { class: "hero-lede" }, DATA.subtitle),
    el("div", { class: "search-hero" }, [
      el("svg", { width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": "2", "stroke-linecap": "round", "stroke-linejoin": "round",
                  html: '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>' }),
      el("input", {
        type: "search",
        placeholder: "Search people, labs, equipment, expertise…",
        "aria-label": "Search directory",
        onkeydown: (e) => {
          if (e.key === "Enter") {
            const q = e.target.value.trim();
            location.hash = "#/directory" + (q ? "?q=" + encodeURIComponent(q) : "");
          }
        },
      }),
    ]),
  ]);
  app.appendChild(hero);

  const stats = el("div", { class: "stats" }, [
    el("div", { class: "stat" }, [
      el("div", { class: "stat-number" }, String(totalLabs)),
      el("div", { class: "stat-label" }, "Labs & Groups"),
    ]),
    el("div", { class: "stat" }, [
      el("div", { class: "stat-number" }, String(totalPeople)),
      el("div", { class: "stat-label" }, "Researchers"),
    ]),
    el("div", { class: "stat" }, [
      el("div", { class: "stat-number" }, String(totalEquip)),
      el("div", { class: "stat-label" }, "Shared Instruments"),
    ]),
  ]);
  app.appendChild(stats);

  app.appendChild(el("div", { class: "section-heading" }, [
    el("h2", {}, "Labs & Groups"),
    el("span", { class: "count" }, String(totalLabs)),
  ]));

  const grid = el("div", { class: "lab-grid" });
  for (const lab of DATA.labs) {
    const tile = el("a", { href: "#/lab/" + lab.slug, class: "lab-tile" });
    const photosDiv = el("div", { class: "lab-tile-photos" + (lab.photos.length === 0 ? " empty" : "") });
    if (lab.photos.length === 0) {
      photosDiv.textContent = "photo pending";
    } else {
      for (const photo of lab.photos) {
        photosDiv.appendChild(el("img", {
          src: photo,
          alt: lab.display_name + " Principal Investigator",
          loading: "lazy",
        }));
      }
    }
    tile.appendChild(photosDiv);
    const nNamed = lab.personnel.filter(p => p.name).length;
    tile.appendChild(el("div", { class: "lab-tile-body" }, [
      el("div", { class: "lab-tile-name" }, lab.display_name),
      el("div", { class: "lab-tile-meta" },
        nNamed + (nNamed === 1 ? " researcher" : " researchers")),
    ]));
    grid.appendChild(tile);
  }
  app.appendChild(grid);
}

function renderDirectory() {
  setActiveNav("directory");
  const { params } = parseHash();
  const initialQuery = params.get("q") || "";
  const people = allPersonnel().filter(p => p.name);

  app.innerHTML = "";

  app.appendChild(el("h1", { class: "view-title" }, "Master Directory"));
  app.appendChild(el("p", { class: "view-subtitle" },
    "Search across every person in every lab — by name, lab, expertise, equipment, or research interest."));

  const searchPanel = el("div", { class: "search-panel" });
  const inputWrap = el("div", { class: "search-input-wrap" });
  const searchIcon = el("svg", { class: "icon-search", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": "2", "stroke-linecap": "round", "stroke-linejoin": "round",
    html: '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>' });
  const input = el("input", {
    type: "search",
    placeholder: "Search 42 researchers…",
    value: initialQuery,
    "aria-label": "Filter directory",
  });
  const clearBtn = el("button", { class: "search-clear" + (initialQuery ? " visible" : ""), "aria-label": "Clear search",
    html: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>' });
  clearBtn.addEventListener("click", () => { input.value = ""; input.focus(); render(); });

  const countEl = el("div", { class: "result-count" });
  const resultsEl = el("div", { class: "results" });

  inputWrap.appendChild(searchIcon);
  inputWrap.appendChild(input);
  inputWrap.appendChild(clearBtn);
  searchPanel.appendChild(inputWrap);
  searchPanel.appendChild(countEl);

  app.appendChild(searchPanel);
  app.appendChild(resultsEl);

  const render = () => {
    const q = input.value.trim();
    clearBtn.classList.toggle("visible", !!q);
    setSearchParam("q", q);

    const filtered = people.filter(p =>
      matches(p.name, q) || matches(p.lab.display_name, q) ||
      matches(p.assets, q) || matches(p.expertise, q) || matches(p.interests, q)
    );

    countEl.innerHTML = q
      ? `Showing <strong>${filtered.length}</strong> of ${people.length} people matching &ldquo;${escapeHTML(q)}&rdquo;`
      : `Showing all <strong>${people.length}</strong> people`;

    resultsEl.innerHTML = "";
    if (filtered.length === 0) {
      resultsEl.appendChild(el("div", { class: "empty-state" }, [
        el("h3", {}, "No matches"),
        el("p", {}, "Try a different keyword, or clear the search to see everyone."),
      ]));
      return;
    }
    for (const p of filtered) {
      const card = el("div", { class: "result-card" });
      const nameDisplay = p.name || "(lab-wide / unattributed)";
      const nameCls = p.name ? "result-name" : "result-name muted";

      card.appendChild(el("div", { class: "result-header" }, [
        el("div", { class: nameCls, html: highlight(nameDisplay, q) }),
        el("a", { href: "#/lab/" + p.lab.slug, class: "result-lab chip-link",
                  html: highlight(p.lab.display_name, q) }),
      ]));

      const fields = el("div", { class: "result-fields" });
      const addField = (label, value) => {
        if (!value) return;
        fields.appendChild(el("div", { class: "result-field" }, [
          el("div", { class: "result-field-label" }, label),
          el("div", { class: "result-field-value", html: highlight(value, q) }),
        ]));
      };
      addField("Expertise", p.expertise);
      addField("Interests", p.interests);
      addField("Equipment", p.assets);
      if (fields.children.length) card.appendChild(fields);

      resultsEl.appendChild(card);
    }
  };

  input.addEventListener("input", render);
  render();
  // Focus the search input on directory view if we came from home with a query
  if (initialQuery) input.setSelectionRange(input.value.length, input.value.length);
}

function renderEquipment() {
  setActiveNav("equipment");
  const { params } = parseHash();
  const initialQuery = params.get("q") || "";
  const items = allEquipment();

  app.innerHTML = "";

  app.appendChild(el("h1", { class: "view-title" }, "Equipment Index"));
  app.appendChild(el("p", { class: "view-subtitle" },
    "Search across all shared equipment in the Division — by lab, contact, or piece of gear."));

  const searchPanel = el("div", { class: "search-panel" });
  const inputWrap = el("div", { class: "search-input-wrap" });
  inputWrap.appendChild(el("svg", { class: "icon-search", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": "2", "stroke-linecap": "round", "stroke-linejoin": "round",
    html: '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>' }));
  const input = el("input", {
    type: "search",
    placeholder: "Try microscope, PCR, plate reader…",
    value: initialQuery,
    "aria-label": "Filter equipment",
  });
  const clearBtn = el("button", { class: "search-clear" + (initialQuery ? " visible" : ""), "aria-label": "Clear search",
    html: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>' });
  clearBtn.addEventListener("click", () => { input.value = ""; input.focus(); render(); });
  const countEl = el("div", { class: "result-count" });
  const resultsEl = el("div", { class: "results" });

  inputWrap.appendChild(input);
  inputWrap.appendChild(clearBtn);
  searchPanel.appendChild(inputWrap);
  searchPanel.appendChild(countEl);
  app.appendChild(searchPanel);
  app.appendChild(resultsEl);

  const render = () => {
    const q = input.value.trim();
    clearBtn.classList.toggle("visible", !!q);
    setSearchParam("q", q);
    const filtered = items.filter(i =>
      matches(i.lab.display_name, q) || matches(i.contact, q) || matches(i.equipment, q)
    );
    countEl.innerHTML = q
      ? `Showing <strong>${filtered.length}</strong> of ${items.length} items matching &ldquo;${escapeHTML(q)}&rdquo;`
      : `Showing all <strong>${items.length}</strong> items`;
    resultsEl.innerHTML = "";
    if (filtered.length === 0) {
      resultsEl.appendChild(el("div", { class: "empty-state" }, [
        el("h3", {}, "No matches"),
        el("p", {}, "Try a different keyword, or clear the search to see all equipment."),
      ]));
      return;
    }
    for (const it of filtered) {
      const card = el("div", { class: "result-card equipment-card" });
      card.appendChild(el("a", {
        href: "#/lab/" + it.lab.slug,
        class: "result-lab chip-link",
        html: highlight(it.lab.display_name, q),
      }));
      card.appendChild(el("div", { class: "equipment-contact", html: highlight(it.contact, q) }));
      card.appendChild(el("div", { class: "equipment-name", html: highlight(it.equipment, q) }));
      resultsEl.appendChild(card);
    }
  };
  input.addEventListener("input", render);
  render();
}

function renderLab(slug) {
  setActiveNav(""); // no top-level active
  const lab = labBySlug(slug);
  if (!lab) {
    app.innerHTML = "";
    app.appendChild(el("div", { class: "empty-state" }, [
      el("h3", {}, "Lab not found"),
      el("p", {}, "The lab you're looking for doesn't exist. "),
      el("p", {}, [ el("a", { href: "#/" }, "Return home") ]),
    ]));
    return;
  }
  app.innerHTML = "";
  app.appendChild(el("a", { href: "#/", class: "back-link", html:
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> All labs'
  }));

  // Hero
  const photosEl = el("div", { class: "pi-photos" });
  if (lab.photos.length === 0) {
    photosEl.appendChild(el("div", { class: "empty-state", html:
      '<h3>Photo pending</h3><p>Add a PI photo here.</p>' }));
  } else {
    for (const photo of lab.photos) {
      photosEl.appendChild(el("div", { class: "pi-photo-wrap" }, [
        el("img", { src: photo, alt: lab.display_name + " PI", class: "pi-photo" }),
      ]));
    }
  }
  const namedPersonnel = lab.personnel.filter(p => p.name);
  const nEquipRows = lab.personnel.filter(p => p.assets).length;
  const hero = el("div", { class: "lab-hero" }, [
    photosEl,
    el("div", { class: "lab-hero-content" }, [
      el("div", { class: "pi-label" }, lab.photos.length > 1 ? "Principal Investigators" : "Principal Investigator"),
      el("h1", {}, lab.display_name),
      el("div", { class: "lab-stats" }, [
        el("div", {}, [
          el("strong", {}, String(namedPersonnel.length)),
          "Personnel",
        ]),
        el("div", {}, [
          el("strong", {}, String(nEquipRows)),
          "Equipment entries",
        ]),
      ]),
    ]),
  ]);
  app.appendChild(hero);

  // Personnel
  app.appendChild(el("div", { class: "section-heading" }, [
    el("h2", {}, "Personnel"),
    el("span", { class: "count" }, String(namedPersonnel.length)),
  ]));
  if (namedPersonnel.length === 0) {
    app.appendChild(el("div", { class: "empty-lab-note" },
      "No personnel entries yet — this lab profile is being populated."));
    return;
  }
  const list = el("div", { class: "personnel-list" });
  for (const p of namedPersonnel) {
    const nameDisplay = p.name || "(lab-wide / unattributed)";
    const nameCls = p.name ? "result-name" : "result-name muted";
    const card = el("div", { class: "person-card" });
    card.appendChild(el("div", { class: nameCls }, nameDisplay));
    const fields = el("div", { class: "result-fields" });
    const addField = (label, value) => {
      if (!value) return;
      fields.appendChild(el("div", { class: "result-field" }, [
        el("div", { class: "result-field-label" }, label),
        el("div", { class: "result-field-value" }, value),
      ]));
    };
    addField("Expertise", p.expertise);
    addField("Interests", p.interests);
    addField("Equipment", p.assets);
    if (fields.children.length) card.appendChild(fields);
    list.appendChild(card);
  }
  app.appendChild(list);
}

/* ── Router dispatch ──────────────────────────────────────── */
function route() {
  window.scrollTo(0, 0);
  const { segments } = parseHash();
  if (segments.length === 0) return renderHome();
  if (segments[0] === "directory") return renderDirectory();
  if (segments[0] === "equipment") return renderEquipment();
  if (segments[0] === "lab" && segments[1]) return renderLab(segments[1]);
  renderHome();
}

/* ── Boot ─────────────────────────────────────────────────── */
function boot() {
  const dataScript = document.getElementById("site-data");
  DATA = JSON.parse(dataScript.textContent);
  window.addEventListener("hashchange", route);
  route();
}

boot();
</script>
